<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watchlist – CineMania</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar" id="navbar"></nav>
<div class="search-overlay" id="searchOverlay"><div class="search-box"><div class="search-input-wrap"><span class="search-icon">🔍</span><input type="text" class="search-input" id="searchInput" oninput="handleSearch(event)" autocomplete="off"><button class="search-close-btn" onclick="closeSearch()">✕</button></div></div><div class="search-results" id="searchResults"></div></div>
<div class="page-hero"><h1>MY <span style="color:var(--accent-red)">WATCHLIST</span></h1><p>Your saved movies and shows</p></div>
<div class="section" style="padding-top:0">
  <div class="content-grid" id="watchlistGrid"><div class="loader"><div class="spinner"></div></div></div>
</div>
<div class="modal-overlay" id="loginModal"><div class="modal"><button class="modal-close" onclick="closeModal('loginModal')">✕</button><div class="modal-title">LOG IN REQUIRED</div><div id="loginAlert"></div><form onsubmit="handleLogin(event)"><div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" id="loginEmail" required></div><div class="form-group"><label class="form-label">Password</label><input type="password" class="form-control" id="loginPassword" required></div><button type="submit" class="btn btn-primary btn-lg form-submit">Log In</button></form></div></div>
<div class="modal-overlay" id="registerModal"><div class="modal"><button class="modal-close" onclick="closeModal('registerModal')">✕</button><div class="modal-title">JOIN CINEMANIA</div><div id="registerAlert"></div><form onsubmit="handleRegister(event)"><div class="form-group"><label class="form-label">Name</label><input type="text" class="form-control" id="regName" required></div><div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" id="regEmail" required></div><div class="form-group"><label class="form-label">Password</label><input type="password" class="form-control" id="regPassword" required minlength="6"></div><button type="submit" class="btn btn-primary btn-lg form-submit">Create Account</button></form></div></div>
<script src="/js/app.js"></script>
<script>
if (!Auth.isLoggedIn()) { openModal('loginModal'); }
async function loadWatchlist() {
  const items = await apiFetch('/content/user/watchlist');
  const grid = document.getElementById('watchlistGrid');
  if (!items.length) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📋</div><div class="empty-title">Your watchlist is empty</div><div class="empty-text">Browse content and add to your watchlist</div><br><a href="/browse.html" class="btn btn-primary">Browse Content</a></div>'; return; }
  grid.innerHTML = items.map(c => `
    <div class="content-card grid-card" onclick="window.location='/browse.html?id=${c.id}'">
      <div class="card-poster">${getContentEmoji(c.genre)}</div>
      <div class="card-overlay">
        <div class="card-title">${c.title}</div>
        <div class="card-meta">⭐ ${c.rating} · ${c.type}</div>
        <div class="card-actions">
          <button class="btn btn-primary btn-sm" onclick="watchContent(event,${c.id})">▶ Play</button>
          <button class="btn btn-ghost btn-sm" onclick="removeItem(event,${c.id})">🗑️</button>
        </div>
      </div>
    </div>`).join('');
}
async function removeItem(e, id) {
  e.stopPropagation();
  await apiFetch('/content/' + id + '/watchlist', {method:'DELETE'});
  toast('Removed', 'info');
  loadWatchlist();
}
loadWatchlist();
</script>
</body>
</html>
