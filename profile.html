<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile – CineMania</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar" id="navbar"></nav>
<div class="search-overlay" id="searchOverlay"><div class="search-box"><div class="search-input-wrap"><span class="search-icon">🔍</span><input type="text" class="search-input" id="searchInput" oninput="handleSearch(event)" autocomplete="off"><button class="search-close-btn" onclick="closeSearch()">✕</button></div></div><div class="search-results" id="searchResults"></div></div>

<div class="page-hero">
  <h1>MY <span style="color:var(--accent-red)">PROFILE</span></h1>
  <p>Manage your account and subscription</p>
</div>

<div class="profile-grid">
  <aside class="profile-sidebar">
    <div class="profile-avatar-wrap" id="profileAvatar">U</div>
    <div class="profile-name" id="profileName">Loading...</div>
    <div class="profile-email" id="profileEmail"></div>
    <div style="text-align:center;margin-top:0.8rem" id="profilePlanBadge"></div>
    <div class="tab-list">
      <button class="tab-btn active" onclick="switchTab('subscription')">💎 Subscription</button>
      <button class="tab-btn" onclick="switchTab('watchlist')">📋 Watchlist</button>
      <button class="tab-btn" onclick="switchTab('history')">📜 Watch History</button>
      <button class="tab-btn" onclick="switchTab('settings')">⚙️ Settings</button>
    </div>
  </aside>
  <main>
    <!-- SUBSCRIPTION TAB -->
    <div class="tab-panel active" id="tab-subscription">
      <h2 style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;margin-bottom:1.5rem">YOUR SUBSCRIPTION</h2>
      <div id="subContent"><div class="loader"><div class="spinner"></div></div></div>
    </div>
    <!-- WATCHLIST TAB -->
    <div class="tab-panel" id="tab-watchlist">
      <h2 style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;margin-bottom:1.5rem">YOUR WATCHLIST</h2>
      <div class="content-grid" id="watchlistGrid"><div class="loader"><div class="spinner"></div></div></div>
    </div>
    <!-- HISTORY TAB -->
    <div class="tab-panel" id="tab-history">
      <h2 style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;margin-bottom:1.5rem">WATCH HISTORY</h2>
      <div class="content-grid" id="historyGrid"><div class="loader"><div class="spinner"></div></div></div>
    </div>
    <!-- SETTINGS TAB -->
    <div class="tab-panel" id="tab-settings">
      <h2 style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;margin-bottom:1.5rem">ACCOUNT SETTINGS</h2>
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;max-width:500px">
        <form onsubmit="updateProfile(event)">
          <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-control" id="settingsName" placeholder="Your name"></div>
          <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" id="settingsEmail" placeholder="your@email.com" disabled style="opacity:0.6"></div>
          <div class="form-group"><label class="form-label">New Password</label><input type="password" class="form-control" id="settingsPassword" placeholder="Leave blank to keep current"></div>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
        <div style="margin-top:2rem;padding-top:2rem;border-top:1px solid var(--border)">
          <h4 style="margin-bottom:1rem;color:var(--accent-red)">Danger Zone</h4>
          <button class="btn btn-outline" style="border-color:var(--accent-red);color:var(--accent-red)" onclick="logout()">🚪 Logout from All Devices</button>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="loginModal"><div class="modal"><button class="modal-close" onclick="closeModal('loginModal')">✕</button><div class="modal-title">LOG IN REQUIRED</div><div class="modal-subtitle">Please sign in to view your profile</div><div id="loginAlert"></div><form onsubmit="handleLogin(event)"><div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" id="loginEmail" required></div><div class="form-group"><label class="form-label">Password</label><input type="password" class="form-control" id="loginPassword" required></div><button type="submit" class="btn btn-primary btn-lg form-submit">Log In</button></form></div></div>
<div class="modal-overlay" id="registerModal"><div class="modal"><button class="modal-close" onclick="closeModal('registerModal')">✕</button><div class="modal-title">JOIN CINEMANIA</div><div id="registerAlert"></div><form onsubmit="handleRegister(event)"><div class="form-group"><label class="form-label">Name</label><input type="text" class="form-control" id="regName" required></div><div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" id="regEmail" required></div><div class="form-group"><label class="form-label">Password</label><input type="password" class="form-control" id="regPassword" required minlength="6"></div><button type="submit" class="btn btn-primary btn-lg form-submit">Create Account</button></form></div></div>

<script src="/js/app.js"></script>
<script>
if (!Auth.isLoggedIn()) { window.location = '/'; }

function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name)?.classList.add('active');
  event.target.classList.add('active');
  if (name === 'watchlist') loadWatchlist();
  if (name === 'history') loadHistory();
}

async function loadProfile() {
  try {
    const data = await apiFetch('/auth/profile');
    const u = data.user;
    document.getElementById('profileAvatar').textContent = u.name[0].toUpperCase();
    document.getElementById('profileName').textContent = u.name;
    document.getElementById('profileEmail').textContent = u.email;
    document.getElementById('settingsName').value = u.name;
    document.getElementById('settingsEmail').value = u.email;

    const sub = data.subscription;
    const badge = document.getElementById('profilePlanBadge');
    if (sub) {
      badge.innerHTML = `<span class="badge badge-${sub.plan_name?.toLowerCase()}">${sub.plan_name} Plan</span>`;
    }

    const subContent = document.getElementById('subContent');
    if (sub) {
      subContent.innerHTML = `
        <div class="sub-card">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem">
            <div>
              <div class="sub-plan-name">🏆 ${sub.plan_name} PLAN</div>
              <div class="sub-expires">Active until: ${new Date(sub.end_date).toLocaleDateString('en-IN', {year:'numeric',month:'long',day:'numeric'})}</div>
            </div>
            <span class="badge badge-active">● ACTIVE</span>
          </div>
          <div class="sub-feats">
            <div class="sub-feat"><div class="sub-feat-val">${sub.max_screens}</div><div class="sub-feat-label">Screens</div></div>
            <div class="sub-feat"><div class="sub-feat-val">${sub.video_quality}</div><div class="sub-feat-label">Quality</div></div>
            <div class="sub-feat"><div class="sub-feat-val">${sub.downloads ? '✅' : '❌'}</div><div class="sub-feat-label">Downloads</div></div>
          </div>
          <div style="display:flex;gap:1rem;flex-wrap:wrap">
            <a href="/plans.html" class="btn btn-primary">⬆️ Upgrade Plan</a>
            <button class="btn btn-outline" style="border-color:var(--accent-red);color:var(--accent-red)" onclick="cancelSub()">Cancel Subscription</button>
          </div>
        </div>`;
    } else {
      subContent.innerHTML = `
        <div style="background:var(--bg-card);border:1px dashed var(--border);border-radius:var(--radius-lg);padding:3rem;text-align:center">
          <div style="font-size:4rem;margin-bottom:1rem">🎬</div>
          <h3 style="margin-bottom:0.5rem">No Active Subscription</h3>
          <p style="color:var(--text-secondary);margin-bottom:1.5rem">Subscribe to unlock thousands of movies and shows</p>
          <a href="/plans.html" class="btn btn-primary btn-lg">🚀 View Plans</a>
        </div>`;
    }
  } catch(err) { console.error(err); }
}

async function cancelSub() {
  if (!confirm('Cancel your subscription? You will retain access until expiry.')) return;
  try {
    await apiFetch('/subscriptions/cancel', { method: 'PUT' });
    toast('Subscription cancelled.', 'info');
    loadProfile();
  } catch(err) { toast(err.message, 'error'); }
}

async function loadWatchlist() {
  try {
    const items = await apiFetch('/content/user/watchlist');
    const grid = document.getElementById('watchlistGrid');
    if (!items.length) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📋</div><div class="empty-title">Watchlist is empty</div><div class="empty-text">Add movies and shows to watch later</div></div>'; return; }
    grid.innerHTML = items.map(c => `
      <div class="content-card grid-card" onclick="window.location='/browse.html?id=${c.id}'">
        <div class="card-poster">${getContentEmoji(c.genre)}</div>
        <div class="card-overlay">
          <div class="card-title">${c.title}</div>
          <div class="card-meta">⭐ ${c.rating} · ${c.type}</div>
          <div class="card-actions">
            <button class="btn btn-primary btn-sm" onclick="watchContent(event,${c.id})">▶ Play</button>
            <button class="btn btn-ghost btn-sm" onclick="removeWatchlist(event,${c.id})">🗑️</button>
          </div>
        </div>
      </div>`).join('');
  } catch(err) {}
}

async function removeWatchlist(e, id) {
  e.stopPropagation();
  await apiFetch(`/content/${id}/watchlist`, { method: 'DELETE' });
  toast('Removed from watchlist', 'info');
  loadWatchlist();
}

async function loadHistory() {
  try {
    const items = await apiFetch('/content/user/history');
    const grid = document.getElementById('historyGrid');
    if (!items.length) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📜</div><div class="empty-title">No watch history</div><div class="empty-text">Start watching to see your history here</div></div>'; return; }
    grid.innerHTML = items.map(c => `
      <div class="content-card grid-card" onclick="window.location='/browse.html?id=${c.id}'">
        <div class="card-poster">${getContentEmoji(c.genre)}</div>
        <div class="card-overlay">
          <div class="card-title">${c.title}</div>
          <div class="card-meta">⌚ ${new Date(c.watched_at).toLocaleDateString()}</div>
          <div class="card-actions"><button class="btn btn-primary btn-sm" onclick="watchContent(event,${c.id})">▶ Play Again</button></div>
        </div>
      </div>`).join('');
  } catch(err) {}
}

function updateProfile(e) {
  e.preventDefault();
  toast('Profile updated!', 'success');
}

loadProfile();
</script>
</body>
</html>
